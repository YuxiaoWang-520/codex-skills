<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Harness Craft flagship overview</title>
  <desc id="desc">A visual overview of the four flagship skills in Harness Craft.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="100%" stop-color="#14263b"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a66c2"/>
      <stop offset="33%" stop-color="#2ea44f"/>
      <stop offset="66%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="520" rx="36" fill="url(#bg)"/>
  <text x="70" y="88" fill="#f8fafc" font-size="44" font-weight="700" font-family="Segoe UI, Arial, sans-serif">The 4-layer operating system</text>
  <text x="70" y="132" fill="#cbd5e1" font-size="22" font-family="Segoe UI, Arial, sans-serif">Context, execution, collaboration, and learning arranged as one durable stack.</text>
  <rect x="70" y="164" width="1260" height="8" rx="4" fill="url(#line)"/>

  <g transform="translate(70 214)">
    <rect x="0" y="0" width="292" height="220" rx="28" fill="#0f1a2a" stroke="#60a5fa" stroke-opacity="0.55"/>
    <text x="26" y="44" fill="#93c5fd" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">01</text>
    <text x="26" y="88" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">repo-bootstrap</text>
    <text x="26" y="126" fill="#dbeafe" font-size="21" font-family="Segoe UI, Arial, sans-serif">Persist repo understanding</text>
    <text x="26" y="156" fill="#dbeafe" font-size="21" font-family="Segoe UI, Arial, sans-serif">into durable local artifacts.</text>
    <text x="26" y="196" fill="#60a5fa" font-size="18" font-family="Segoe UI, Arial, sans-serif">Layer: Context</text>

    <rect x="322" y="0" width="292" height="220" rx="28" fill="#0f1a2a" stroke="#4ade80" stroke-opacity="0.55"/>
    <text x="348" y="44" fill="#86efac" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">02</text>
    <text x="348" y="88" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">longrun-dev</text>
    <text x="348" y="126" fill="#dcfce7" font-size="21" font-family="Segoe UI, Arial, sans-serif">Keep long tasks focused,</text>
    <text x="348" y="156" fill="#dcfce7" font-size="21" font-family="Segoe UI, Arial, sans-serif">stateful, and evidence-backed.</text>
    <text x="348" y="196" fill="#4ade80" font-size="18" font-family="Segoe UI, Arial, sans-serif">Layer: Execution</text>

    <rect x="644" y="0" width="292" height="220" rx="28" fill="#0f1a2a" stroke="#c084fc" stroke-opacity="0.55"/>
    <text x="670" y="44" fill="#ddd6fe" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">03</text>
    <text x="670" y="88" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">agent-team-dev</text>
    <text x="670" y="126" fill="#ede9fe" font-size="21" font-family="Segoe UI, Arial, sans-serif">Coordinate bounded parallel</text>
    <text x="670" y="156" fill="#ede9fe" font-size="21" font-family="Segoe UI, Arial, sans-serif">work with explicit ownership.</text>
    <text x="670" y="196" fill="#c084fc" font-size="18" font-family="Segoe UI, Arial, sans-serif">Layer: Collaboration</text>

    <rect x="966" y="0" width="292" height="220" rx="28" fill="#0f1a2a" stroke="#fb923c" stroke-opacity="0.6"/>
    <text x="992" y="44" fill="#fdba74" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">04</text>
    <text x="992" y="88" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">learn</text>
    <text x="992" y="126" fill="#ffedd5" font-size="21" font-family="Segoe UI, Arial, sans-serif">Turn corrections and patterns</text>
    <text x="992" y="156" fill="#ffedd5" font-size="21" font-family="Segoe UI, Arial, sans-serif">into reusable long-term memory.</text>
    <text x="992" y="196" fill="#fb923c" font-size="18" font-family="Segoe UI, Arial, sans-serif">Layer: Knowledge</text>
  </g>
</svg>
