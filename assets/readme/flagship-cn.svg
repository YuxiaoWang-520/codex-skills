<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Harness Craft 四层系统总览</title>
  <desc id="desc">一个用来概括 Harness Craft 四个核心技能的视觉总览图。</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="100%" stop-color="#14263b"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a66c2"/>
      <stop offset="33%" stop-color="#2ea44f"/>
      <stop offset="66%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="520" rx="36" fill="url(#bg)"/>
  <text x="70" y="88" fill="#f8fafc" font-size="44" font-weight="700" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">四层操作系统</text>
  <text x="70" y="132" fill="#cbd5e1" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">把上下文、执行、协作与学习组合成一套真正稳定的 Agent 工程系统。</text>
  <rect x="70" y="164" width="1260" height="8" rx="4" fill="url(#line)"/>

  <g transform="translate(70 214)">
    <rect x="0" y="0" width="292" height="220" rx="28" fill="#0f1a2a" stroke="#60a5fa" stroke-opacity="0.55"/>
    <text x="26" y="44" fill="#93c5fd" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">01</text>
    <text x="26" y="88" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">repo-bootstrap</text>
    <text x="26" y="126" fill="#dbeafe" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">把仓库认知沉淀成</text>
    <text x="26" y="156" fill="#dbeafe" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">可持续维护的本地工件。</text>
    <text x="26" y="196" fill="#60a5fa" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">层级：上下文</text>

    <rect x="322" y="0" width="292" height="220" rx="28" fill="#0f1a2a" stroke="#4ade80" stroke-opacity="0.55"/>
    <text x="348" y="44" fill="#86efac" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">02</text>
    <text x="348" y="88" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">longrun-dev</text>
    <text x="348" y="126" fill="#dcfce7" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">让长任务跨 session 仍然</text>
    <text x="348" y="156" fill="#dcfce7" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">聚焦、可验证、可恢复。</text>
    <text x="348" y="196" fill="#4ade80" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">层级：执行</text>

    <rect x="644" y="0" width="292" height="220" rx="28" fill="#0f1a2a" stroke="#c084fc" stroke-opacity="0.55"/>
    <text x="670" y="44" fill="#ddd6fe" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">03</text>
    <text x="670" y="88" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">agent-team-dev</text>
    <text x="670" y="126" fill="#ede9fe" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">用 ownership 与 review</text>
    <text x="670" y="156" fill="#ede9fe" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">控制并行协作不失控。</text>
    <text x="670" y="196" fill="#c084fc" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">层级：协作</text>

    <rect x="966" y="0" width="292" height="220" rx="28" fill="#0f1a2a" stroke="#fb923c" stroke-opacity="0.6"/>
    <text x="992" y="44" fill="#fdba74" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1.5">04</text>
    <text x="992" y="88" fill="#ffffff" font-size="30" font-weight="700" font-family="Segoe UI, Arial, sans-serif">learn</text>
    <text x="992" y="126" fill="#ffedd5" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">把纠正、模式与偏好</text>
    <text x="992" y="156" fill="#ffedd5" font-size="21" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">变成可复用的长期记忆。</text>
    <text x="992" y="196" fill="#fb923c" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">层级：知识</text>
  </g>
</svg>
